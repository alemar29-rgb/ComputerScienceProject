<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScout</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="darkmode.css">
</head>

<body>
    <header>
        <h1 style="text-align: center" class="main-title">🎵SoundScout🎵</h1>
        <div class="header-top">
           <div class="switch-darkmode">
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>

</div>
            </div>
        </div>
   
        <nav class="navBar">
            <button class="btn-nav" id="btn-related-artists">Related Artists</button>
            <button class="btn-nav" id="btn-mood-songs">Mood Songs</button>
            <button class="btn-nav" id="btn-related-songs">Related Songs</button>
            <button class="btn-nav" id="btn-saved-stuff">Saved Stuff</button>
        </nav>
        <div class="settings-container">
  <div class="setting-group">
    <label for="language-select">Select Language:</label>
    <select id="language-select" class="dropdown">
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="zh">Mandarin</option>
      <option value="ru">Russian</option>
      <option value="fr">French</option>
      <option value="it">Italian</option>
      <option value="hi">Hindi</option>
      <option value="tr">Turkish</option>
      <option value="ja">Japanese</option>
    </select>
  </div>
    </header>

    <main class="container">
        <div class="content-section related-artist">
            <h2 class="title">Related Artists</h2>
            <div class="search-bar">
                <input type="text" placeholder="Search for an artist..." id="artist-search">
            </div>
            <div class="artist-card-holder" id="artistHolder"></div>
        </div>

        <div class="content-section mood-song hidden">
            <h2 class="title">Mood Song</h2>
            <div class="dropdown">
                <div class="song-card-container" id="moodSongHolder"></div>
                <button class="dropdown-toggle" type="button" id="dropdownMenuButton" aria-haspopup="true" aria-expanded="false">
                    Select Mood
                </button>
                <div class="dropdownMenu">
                    <a href="#" class="dropDown-item">Sad</a>
                    <a href="#" class="dropDown-item">Happy</a>
                    <a href="#" class="dropDown-item">Energetic</a>
                    <a href="#" class="dropDown-item">Depressed</a>
                    <a href="#" class="dropDown-item">Angry</a>
                    <a href="#" class="dropDown-item">Anxious</a>
                    <a href="#" class="dropDown-item">Relaxed</a>
                </div>
            </div>
        </div>

        <div class="content-section related-songs hidden">
            <h2 class="title">Related Songs</h2>
            <div class="search-bar">
                <input type="text" id="song-search" placeholder="Search for a song...">
            </div>
            <div class="song-card-container" id="songCard-container"></div>
        </div>


      <div class="content-section saved-stuff-section hidden">
    <h2 class="title">Saved Stuff</h2>
    <p class="section-subtitle">Your collection of bookmarked tracks and artists</p>
    <div class="saved-container" id="savedItemsHolder"></div>
    <div class="setting-group">
    <button id="clear-storage-btn" class="danger-button">Clear All Data</button>
  </div>
</div>
</div>
    </main>

    <script src="javascript/api.js"></script>
    <script src="javascript/localStorage.js"></script>
    <script src="javascript/script.js"></script>
</body>

</html>
