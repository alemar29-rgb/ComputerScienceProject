<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundScout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navBar">
        <button class="btn-nav" id="btn-related-artists">Related Artists</button>
        <button class="btn-nav" id="btn-mood-songs">Mood Songs</button>
        <button class="btn-nav" id="btn-related-songs">Related Songs</button>
    </nav>

    <main class="container">
        <div class="content-section related_artist hidden">
            <h2 class="title">Related Artists</h2>
            <div class="search-bar">
                <input type="text" placeholder="Search for an artist...">
            </div>
            <div class="card-holder">
                </div>
        </div>

        <div class="content-section mood_song hidden">
            <h2 class="title">Mood Song</h2>
        </div>

        <div class="content-section related_songs hidden">
            <h2 class="title">Related Songs</h2>
        </div>
    </main>

    <script src="javascript/script.js"></script>
    <script src="javascript/localStorage.js"></script>
</body>
</html>
